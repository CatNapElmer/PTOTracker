<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Accrual Tracker</title>

  <!-- PWA Manifest & Icons -->
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- iOS Specific Enhancements -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Accruals">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <!-- Android & Global Theme Color -->
  <meta name="theme-color" content="#0f172a">

  <style>
    :root {
      --bg: #0f172a;
      --panel: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --primary: #4f46e5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

    html, body {
      background-color: var(--bg);
      color: var(--text);
      height: 100%;
      overscroll-behavior-y: contain; 
    }

    body {
      display: flex;
      flex-direction: column;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    #app {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
      padding: 16px;
      gap: 16px;
      overflow-y: auto;
    }

    /* Core Components layout styling */
    .top { padding: 8px 4px; }
    .tophead-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    h1 { color: #fff; font-size: 26px; font-weight: 800; }
    .lifetime { color: #94a3b8; font-size: 13px; display: flex; align-items: center; gap: 6px; margin-top: 2px; }
    .ctrls { display: flex; justify-content: space-between; align-items: center; }
    .rate { display: flex; align-items: center; gap: 8px; color: #fff; font-size: 14px; }
    .rate input { width: 75px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; color: #fff; padding: 4px 8px; font-weight: bold; }
    .status { font-size: 12px; color: #94a3b8; }
    
    .gear { background: transparent; border: none; color: #94a3b8; cursor: pointer; padding: 4px; }
    .gear:hover { color: #fff; }

    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .card { background: var(--panel); border-radius: 14px; padding: 14px; display: flex; flex-direction: column; position: relative; border: 1px solid var(--border); }
    .card.dark { background: #1e293b; color: #fff; grid-column: span 2; border: none; }
    .clabel { font-size: 12px; font-weight: 600; color: var(--text-muted); display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    .card.dark .clabel { color: #94a3b8; }
    .ic { display: flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 6px; }
    .val { font-size: 24px; font-weight: 800; line-height: 1; margin-bottom: 6px; }
    .val small { font-size: 13px; font-weight: 500; opacity: 0.7; }
    .cash { font-size: 12px; font-weight: 700; padding: 2px 6px; border-radius: 4px; width: fit-content; margin-bottom: 8px; }
    .badge { font-size: 11px; font-weight: 600; display: flex; align-items: center; gap: 3px; }
    
    .pbar { background: rgba(255,255,255,0.1); height: 6px; border-radius: 3px; margin: 6px 0; overflow: hidden; }
    .pfill { background: #6ee7b7; height: 100%; transition: width 0.3s ease; }
    .phint { font-size: 11px; color: #94a3b8; }

    .nudge { background: #eef2ff; border: 1px solid #c7d2fe; border-radius: 12px; padding: 12px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .nudge .txt { font-size: 13px; color: #3730a3; font-weight: 500; }
    .nudge button { background: #4f46e5; color: #fff; border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }

    .main { display: flex; flex-direction: column; gap: 16px; }
    .panel { background: var(--panel); border-radius: 16px; padding: 20px; border: 1px solid var(--border); }
    h2, h3 { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .h2ic { display: flex; align-items: center; justify-content: center; color: var(--primary); }
    
    /* FIX: Added min-width: 0 to allow internal elements to shrink */
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; min-width: 0; }
    .field label { font-size: 12px; font-weight: 600; color: var(--text-muted); }
    .iwrap { position: relative; display: flex; align-items: center; }
    .iwrap svg { position: absolute; left: 12px; color: var(--text-muted); pointer-events: none; }
    .iwrap input { width: 100%; padding: 10px 10px 10px 36px; border: 1px solid var(--border); border-radius: 10px; font-size: 15px; font-weight: 500; outline: none; background: #f8fafc; }
    .iwrap input:focus { border-color: var(--primary); background: #fff; }
    
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field input.plain { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 10px; font-size: 15px; font-weight: 500; outline: none; background: #f8fafc; text-align: center; }
    .field input.plain:focus { border-color: var(--primary); background: #fff; }
    .field.g input.plain:focus { border-color: #059669; }
    
    .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; transition: background 0.15s; }
    .btn.add { background: var(--primary); color: #fff; }
    .btn.add:active { background: #3730a3; }
    .btn.ok { background: #059669; color: #fff; }

    /* Custom Table View styles */
    .scroll { width: 100%; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: #f8fafc; text-align: left; padding: 10px 8px; color: var(--text-muted); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
    th.r { text-align: right; } th.c { text-align: center; } th.l { text-align: left; }
    td { padding: 10px 8px; border-bottom: 1px solid #f1f5f9; font-weight: 500; vertical-align: middle; }
    td.date { font-weight: 600; color: #334155; }
    td.hrs { text-align: right; font-variant-numeric: tabular-nums; color: #475569; }
    td.bal { text-align: center; font-variant-numeric: tabular-nums; font-size: 13px; line-height: 1.2; white-space: nowrap; }
    td.bal .n { font-weight: 700; font-size: 14px; }
    td.bal .u { font-size: 10px; font-weight: 600; color: #94a3b8; background: #f1f5f9; padding: 1px 4px; border-radius: 4px; }
    td.del { text-align: right; width: 40px; padding-right: 16px; }
    td.del button { background: transparent; border: none; color: #94a3b8; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; }
    td.del button:hover { color: #ef4444; }
    .empty { padding: 40px 20px; text-align: center; color: var(--text-muted); }

    /* Modals layout */
    .modal-bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15,23,42,0.6); display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 100; }
    .settings-card { background: #fff; border-radius: 20px; width: 100%; max-width: 440px; padding: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.15); display: flex; flex-direction: column; gap: 16px; }
    .settings-card h3 { font-size: 18px; margin-bottom: 0; display: flex; justify-content: space-between; align-items: center; width: 100%; color: var(--text); }
    .settings-card .close { background: #f1f5f9; border: none; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); cursor: pointer; }
    .backup-status { font-size: 12px; font-weight: 600; padding: 8px 12px; border-radius: 8px; display: flex; align-items: center; gap: 6px; }
    .backup-status.ok { background: #f0fdf4; color: #166534; }
    .backup-status.warn { background: #fff7ed; color: #9a3412; }
    .opt { border-bottom: 1px solid var(--border); padding-bottom: 16px; }
    .opt:last-of-type { border: none; padding-bottom: 0; }
    .opt h4 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .opt p { font-size: 12px; color: var(--text-muted); line-height: 1.4; margin-bottom: 10px; }
    .opt button { padding: 8px 14px; font-size: 13px; font-weight: 600; border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; border: none; }
    .opt button.primary { background: var(--primary); color: #fff; }
    .opt button.ghost { background: #f1f5f9; color: var(--text); border: 1px solid var(--border); }
    .storage-note { font-size: 11px; text-align: center; color: var(--text-muted); font-weight: 500; }

    /* Notification Banner toast */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1e293b; color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 13px; font-weight: 600; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; pointer-events: none; }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>

</body>
</html>
